# Pipeline CI/CD del backend (FastAPI + uv).
# - En PR a master: corren los gates (quality) + las reviews de Claude (code y security).
# - En push/merge a master: corre quality y, si pasa, deploy a Cloud Run.
# El bloqueo del deploy ante hallazgos de Claude se aplica vía ruleset de la rama master
# (exige que los checks 'quality' y 'security_review' pasen para poder mergear).
name: CI/CD backend

on:
  push:
    branches: [master]        # merge a master -> calidad + deploy
  pull_request:
    branches: [master]        # PR contra master -> calidad + reviews de Claude
  workflow_dispatch:          # ejecución manual desde Actions

# id-token: write -> auth a Google Cloud vía WIF (sin claves).
# pull-requests: write -> que las reviews de Claude puedan comentar el PR.
permissions:
  contents: read
  id-token: write
  pull-requests: write

env:
  PROJECT_ID: rag-proyect-499005
  REGION: us-central1
  SERVICE: rag-backend

jobs:
  # ----------------------------------------------------------------------------
  # Job 1: calidad y seguridad (lint, tests, mutation, escáneres). Gate del deploy.
  # ----------------------------------------------------------------------------
  quality:
    runs-on: ubuntu-latest
    env:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0          # historial completo para SonarQube

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          python-version: "3.13"          # .python-version está gitignored; fijamos 3.13 (onnxruntime no tiene wheel en 3.14)

      - name: Install dependencies
        run: uv sync --dev

      - name: Lint (ruff)
        run: uv run ruff check backend/

      - name: Tests + coverage           # genera coverage.xml para SonarQube
        run: uv run pytest --cov=backend --cov-report=xml --cov-report=term-missing -q

      - name: Mutation testing (mutmut >= 50%)   # falla si el score < 50%
        run: |
          uv run mutmut run || true
          uv run mutmut export-cicd-stats
          uv run python scripts/mutation_gate.py 50

      - name: Trivy filesystem scan       # vulnerabilidades de deps/archivos (solo fixables)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          severity: CRITICAL
          ignore-unfixed: true
          exit-code: '1'
          format: table

      - name: SonarQube Cloud scan        # análisis estático + cobertura (no bloqueante)
        if: ${{ env.SONAR_TOKEN != '' }}
        continue-on-error: true
        uses: SonarSource/sonarqube-scan-action@v4
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  # ----------------------------------------------------------------------------
  # Job 2: revisión de código con Claude (equiv. /code-review). Solo en PR.
  # Es ADVISORY: comenta el PR pero no falla el build (la action no expone exit-code).
  # ----------------------------------------------------------------------------
  code_review:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2
      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            Review this pull request for correctness bugs, code quality,
            best practices and potential security issues. Be concise and
            post the findings as PR review comments.
          claude_args: "--model claude-sonnet-4-6 --max-turns 6"

  # ----------------------------------------------------------------------------
  # Job 3: revisión de seguridad con Claude (equiv. /security-review). Solo en PR.
  # GATE DURO: si la action reporta findings-count > 0, el step final falla el job
  # y el ruleset de master impide el merge (y por tanto el deploy).
  # ----------------------------------------------------------------------------
  security_review:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 2
      - id: sec
        uses: anthropics/claude-code-security-review@main
        with:
          claude-api-key: ${{ secrets.ANTHROPIC_API_KEY }}
          comment-pr: 'true'
          claude-model: 'claude-sonnet-4-6'
          exclude-directories: '.venv,mutants,backend/chroma_db,__pycache__'
      - name: Fail if security findings
        if: ${{ steps.sec.outputs.findings-count > 0 }}
        run: |
          echo "Claude security review encontró ${{ steps.sec.outputs.findings-count }} hallazgo(s) — bloqueando."
          exit 1

  # ----------------------------------------------------------------------------
  # Job 4: deploy a Cloud Run. Solo tras pasar 'quality' y solo en push a master.
  # (No depende de los review jobs por 'needs' porque esos corren solo en PR; el
  #  bloqueo real lo hace el ruleset de master, que exige sus checks antes del merge.)
  # ----------------------------------------------------------------------------
  deploy:
    needs: quality
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: projects/235944902030/locations/global/workloadIdentityPools/github-pool/providers/github-provider
          service_account: gh-deployer@rag-proyect-499005.iam.gserviceaccount.com

      - uses: google-github-actions/setup-gcloud@v2

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy "$SERVICE" \
            --source . \
            --project "$PROJECT_ID" \
            --region "$REGION" \
            --allow-unauthenticated \
            --memory 2Gi \
            --cpu 1 \
            --cpu-boost \
            --timeout 300 \
            --max-instances 1 \
            --set-env-vars BUILD_VERSION=${{ github.sha }} \
            --update-secrets ANTHROPIC_API_KEY=ANTHROPIC_API_KEY:latest
