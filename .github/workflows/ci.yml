# Pipeline CI/CD del backend (FastAPI + uv).
# - En PR a master: corren los gates (quality) + las reviews de Claude (code y security).
# - En push/merge a master: corre quality y, si pasa, deploy a Cloud Run.
# El bloqueo del deploy ante hallazgos de Claude se aplica vía ruleset de la rama master
# (exige que los checks 'quality' y 'security_review' pasen para poder mergear).
name: CI/CD backend

on:
  push:
    branches: [master]        # merge a master -> calidad + deploy
  pull_request:
    branches: [master]        # PR contra master -> calidad + reviews de Claude
  workflow_dispatch:          # ejecución manual desde Actions

# id-token: write -> auth a Google Cloud vía WIF (sin claves).
# pull-requests: write -> que las reviews de Claude puedan comentar el PR.
permissions:
  contents: read
  id-token: write
  pull-requests: write

env:
  PROJECT_ID: rag-proyect-499005
  REGION: us-central1
  SERVICE: rag-backend

jobs:
  # ----------------------------------------------------------------------------
  # Job 1: calidad y seguridad (lint, tests, mutation, escáneres). Gate del deploy.
  # ----------------------------------------------------------------------------
  quality:
    runs-on: ubuntu-latest
    env:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0          # historial completo para SonarQube + escaneo de secretos

      - name: Gitleaks (escaneo de secretos)   # gate pre-merge: falla si encuentra secretos
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          python-version: "3.13"          # .python-version está gitignored; fijamos 3.13 (onnxruntime no tiene wheel en 3.14)

      - name: Install dependencies
        run: uv sync --dev

      - name: Lint (ruff)
        run: uv run ruff check backend/

      - name: Tests + coverage           # genera coverage.xml para SonarQube
        run: uv run pytest --cov=backend --cov-report=xml --cov-report=term-missing -q

      - name: Mutation testing (mutmut >= 50%)   # falla si el score < 50%
        run: |
          uv run mutmut run || true
          uv run mutmut export-cicd-stats
          uv run python scripts/mutation_gate.py 50

      - name: Trivy filesystem scan       # vulnerabilidades de deps/archivos (solo fixables)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          severity: CRITICAL
          ignore-unfixed: true
          exit-code: '1'
          format: table

      - name: SonarQube Cloud scan        # análisis estático + cobertura (no bloqueante)
        if: ${{ env.SONAR_TOKEN != '' }}
        continue-on-error: true
        uses: SonarSource/sonarqube-scan-action@v6
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  # Job 2: revisión de código con Gemini (run-gemini-cli sobre Vertex AI). Solo en PR. Advisory.
  code_review:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2
      - uses: google-github-actions/run-gemini-cli@v0.1.22
        env:
          GEMINI_CLI_TRUST_WORKSPACE: "true"
        with:
          gemini_cli_version: "0.45.0"
          gemini_model: gemini-2.5-flash
          use_vertex_ai: true
          gcp_workload_identity_provider: projects/235944902030/locations/global/workloadIdentityPools/github-pool/providers/github-provider
          gcp_service_account: gh-deployer@rag-proyect-499005.iam.gserviceaccount.com
          gcp_project_id: rag-proyect-499005
          gcp_location: us-central1
          gcp_token_format: access_token
          settings: '{"model":{"name":"gemini-2.5-flash"},"experimental":{"useModelRouter":false}}'
          prompt: |
            You are reviewing a pull request in this repository. Inspect the PR diff for
            correctness bugs, code quality and best practices. Be concise and post your
            findings as comments on the pull request using the available GitHub tools.

  # Job 3: revisión de seguridad con Gemini (run-gemini-cli sobre Vertex AI). Solo en PR. Advisory.
  security_review:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 2
      - uses: google-github-actions/run-gemini-cli@v0.1.22
        env:
          GEMINI_CLI_TRUST_WORKSPACE: "true"
        with:
          gemini_cli_version: "0.45.0"
          gemini_model: gemini-2.5-flash
          use_vertex_ai: true
          gcp_workload_identity_provider: projects/235944902030/locations/global/workloadIdentityPools/github-pool/providers/github-provider
          gcp_service_account: gh-deployer@rag-proyect-499005.iam.gserviceaccount.com
          gcp_project_id: rag-proyect-499005
          gcp_location: us-central1
          gcp_token_format: access_token
          settings: '{"model":{"name":"gemini-2.5-flash"},"experimental":{"useModelRouter":false}}'
          prompt: |
            You are performing a security review of this pull request. Analyze the PR diff
            for security vulnerabilities (injection, broken authn/authz, leaked secrets,
            SSRF, unsafe deserialization, path traversal, risky dependencies). Ignore the
            .venv, mutants, backend/chroma_db and __pycache__ directories. Post concise
            findings as pull request comments. This review is advisory and does not block.

  # Job 3b: reporte de seguridad consolidado (sticky comment). Solo en PR. No bloqueante.
  security_report:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Trivy (reporte JSON, no bloqueante)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          severity: CRITICAL,HIGH,MEDIUM
          ignore-unfixed: false
          format: json
          output: trivy.json
          exit-code: '0'

      - name: Construir reporte
        run: |
          total=$(jq '[.Results[]?.Vulnerabilities[]?] | length' trivy.json)
          crit=$(jq '[.Results[]?.Vulnerabilities[]? | select(.Severity=="CRITICAL")] | length' trivy.json)
          high=$(jq '[.Results[]?.Vulnerabilities[]? | select(.Severity=="HIGH")] | length' trivy.json)
          med=$(jq '[.Results[]?.Vulnerabilities[]? | select(.Severity=="MEDIUM")] | length' trivy.json)
          rows=$(jq -r '[.Results[]?.Vulnerabilities[]?] | sort_by(.Severity) | .[:25] | .[] | "| \(.Severity) | \(.PkgName) | \(.InstalledVersion) | \(.FixedVersion // "—") | \(.VulnerabilityID) |"' trivy.json)
          {
            echo "## 🔐 Reporte de seguridad del PR (no bloqueante)"
            echo ""
            echo "### Trivy — dependencias y archivos"
            echo "Total: **$total** · CRITICAL: **$crit** · HIGH: **$high** · MEDIUM: **$med**"
            echo ""
            if [ -n "$rows" ]; then
              echo "| Sev | Paquete | Instalada | Fix | ID |"
              echo "|---|---|---|---|---|"
              echo "$rows"
              if [ "$total" -gt 25 ]; then echo ""; echo "_…mostrando 25 de $total._"; fi
            else
              echo "✅ Sin vulnerabilidades detectadas por Trivy."
            fi
            echo ""
            echo "---"
            echo "🤖 **Gemini security review** comenta sus hallazgos por separado en este PR."
            echo "📊 **Snyk / SonarQube**: ver sus checks/dashboards (advisory)."
            echo ""
            echo "> Reporte informativo. El gate real sigue siendo \`quality\`: Trivy bloquea ahí las vulnerabilidades con fix de severidad alta; este reporte muestra el panorama completo (incluye MEDIUM y sin-fix)."
          } > security-report.md

      - name: Comentario sticky en el PR
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: security-report
          path: security-report.md

  # ----------------------------------------------------------------------------
  # Job 4: deploy a Cloud Run. Solo tras pasar 'quality' y solo en push a master.
  # (No depende de los review jobs por 'needs' porque esos corren solo en PR; el
  #  bloqueo real lo hace el ruleset de master, que exige sus checks antes del merge.)
  # ----------------------------------------------------------------------------
  deploy:
    needs: quality
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'
    runs-on: ubuntu-latest
    env:
      # Imagen en Artifact Registry (repo creado por el deploy --source inicial).
      IMAGE: us-central1-docker.pkg.dev/rag-proyect-499005/cloud-run-source-deploy/rag-backend
    steps:
      - uses: actions/checkout@v4

      # Auth a Google Cloud vía WIF (sin claves). token_format=access_token para el login de Docker.
      - id: auth
        uses: google-github-actions/auth@v2
        with:
          token_format: access_token
          workload_identity_provider: projects/235944902030/locations/global/workloadIdentityPools/github-pool/providers/github-provider
          service_account: gh-deployer@rag-proyect-499005.iam.gserviceaccount.com

      - uses: google-github-actions/setup-gcloud@v2

      # Login a Artifact Registry con el access token de WIF.
      - uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9   # v3
        with:
          registry: us-central1-docker.pkg.dev
          username: oauth2accesstoken
          password: ${{ steps.auth.outputs.access_token }}

      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f   # v3

      # Sin cache de GHA: exportar las capas (~2GB con torch) al GitHub Actions Cache se atascaba
      # (>30 min). uv re-baja deps rápido; el build directo es ~6 min y determinista.
      - name: Build and push
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8   # v6
        with:
          context: .
          push: true
          tags: ${{ env.IMAGE }}:${{ github.sha }}

      # Despliega la imagen ya construida (sin rebuild en Cloud Build).
      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy "$SERVICE" \
            --image "$IMAGE:${{ github.sha }}" \
            --project "$PROJECT_ID" \
            --region "$REGION" \
            --allow-unauthenticated \
            --memory 2Gi \
            --cpu 1 \
            --cpu-boost \
            --timeout 300 \
            --max-instances 1 \
            --clear-secrets \
            --set-env-vars BUILD_VERSION=${{ github.sha }},GEMINI_MODEL=gemini-2.5-flash,VERTEX_PROJECT_ID=rag-proyect-499005,VERTEX_LOCATION=us-central1,ENABLE_LOAD_ENDPOINT=true
